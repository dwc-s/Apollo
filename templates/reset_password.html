<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/static/fonts/apollo-fonts.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apollo::choose new password</title>
    <script defer src="{{ url_for('static', filename='apollo-nav.js') }}"></script>
</head>
<body>
<nav class="side-nav">
    <a href="/" class="side-nav-brand">Apollo</a>
    <a href="/login" class="side-nav-link"><span class="nav-badge">→</span>Sign in</a>
    <a href="/register" class="side-nav-link"><span class="nav-badge">→</span>Create account</a>
    <div class="side-nav-spacer"></div>
</nav>
<h1 class="title">New password</h1>
<script>
(function fitTitleInit() {
    function fitTitle() {
        document.querySelectorAll('.title').forEach(el => {
            el.style.fontSize = '200px';
            let fs = 200;
            while (el.scrollWidth > el.clientWidth && fs > 14) {
                fs -= 2;
                el.style.fontSize = fs + 'px';
            }
        });
    }
    window.addEventListener('load', fitTitle);
    window.addEventListener('resize', fitTitle);
})();
</script>

{% if error %}
<div class="auth-message error">{{ error }}</div>
{% endif %}
{% if success %}
<div class="auth-message">{{ success }}</div>
<p class="auth-meta">
    <a href="/login">Sign in</a>
</p>
{% elif valid %}
<form action="{{ url_for('reset_password', token=token) }}" method="POST" autocomplete="on">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-panel">

        <span class="form-label">New password (min 8 characters)</span>
        <input type="password" name="new_password" autocomplete="new-password"
               minlength="8" maxlength="128" autofocus required>

        <span class="form-label">Confirm new password</span>
        <input type="password" name="confirm_new_password" autocomplete="new-password"
               minlength="8" maxlength="128" required>

        <div class="submit-row">
            <input type="submit" value="Set password">
        </div>
    </div>
</form>
{% else %}
<p class="auth-meta">
    <a href="/forgot_password">Request a new reset link</a>
</p>
{% endif %}
</body>
</html>
